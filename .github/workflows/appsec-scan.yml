name: CyberMat Shield — Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Nightly scan at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      fail_on:
        description: 'Minimum severity to fail CI (critical|high|medium|low|none)'
        required: false
        default: 'high'

permissions:
  contents: read
  security-events: write  # Required to upload SARIF to GitHub Security tab

jobs:
  static-scan:
    name: Static Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run static security scan
        id: scan
        run: |
          node packages/cli/dist/index.js scan . \
            --sarif \
            --markdown \
            --fail-on ${{ github.event.inputs.fail_on || 'high' }} \
            --output-dir .appsec
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: .appsec/report.sarif
          category: cybermat-shield-static

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cybermat-shield-report
          path: |
            .appsec/report.json
            .appsec/report.html
            .appsec/report.md
            .appsec/report.sarif
          retention-days: 30

      - name: Comment on PR with findings summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '.appsec/report.json';
            if (!fs.existsSync(reportPath)) return;
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf-8'));
            const { summary, riskScore } = report;
            const emoji = riskScore >= 70 ? '✅' : riskScore >= 40 ? '⚠️' : '❌';
            const body = [
              `## ${emoji} CyberMat Shield — Security Scan`,
              `**Risk Score:** ${riskScore}/100`,
              '',
              `| Severity | Count |`,
              `|---|---|`,
              `| 🔴 Critical | ${summary.critical} |`,
              `| 🟠 High | ${summary.high} |`,
              `| 🟡 Medium | ${summary.medium} |`,
              `| 🔵 Low | ${summary.low} |`,
              `| ⚪ Info | ${summary.info} |`,
              '',
              `*Full report available in the [Actions artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).*`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if scan found critical/high issues
        if: steps.scan.outcome == 'failure'
        run: |
          echo "Security scan found critical or high severity findings."
          echo "Review the SARIF report in the GitHub Security tab."
          exit 1

